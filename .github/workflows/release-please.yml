name: Release Please

# Opens (or updates) a release PR with conventional-commit-derived
# version bumps. On merge, release-please tags the release and the
# actual npm publish happens in .github/workflows/publish.yml via
# OpenID Connect (Trusted Publisher). No long-lived NPM_TOKEN needed.
#
# release-please creates branches and PRs using RELEASE_PLEASE_TOKEN
# (a PAT) because the default GITHUB_TOKEN cannot open PRs — that's
# a GitHub-wide security restriction, not a config bug.
#
# To set up the PAT (one-time):
#   1. https://github.com/settings/tokens → Generate new token (classic)
#   2. Scopes: 'repo' (full control of private repositories)
#   3. Repo access: public repos (xorinf/playgenx)
#   4. Copy the token, then: gh secret set RELEASE_PLEASE_TOKEN
#   5. Optional: set an expiry reminder; rotate before it expires.

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    name: Release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: Skip if RELEASE_PLEASE_TOKEN is not configured
        id: skip_check
        run: |
          if [ -z "${{ secrets.RELEASE_PLEASE_TOKEN }}" ]; then
            echo "::warning::RELEASE_PLEASE_TOKEN secret is not set on this repo. Skipping release-please."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout
        if: steps.skip_check.outputs.skip != 'true'
        uses: actions/checkout@v7

      - name: Release Please
        id: release
        if: steps.skip_check.outputs.skip != 'true'
        uses: googleapis/release-please-action@v5
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          # Use the PAT for git operations (branch + PR creation).
          # The default GITHUB_TOKEN can't open PRs by GitHub's policy.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}