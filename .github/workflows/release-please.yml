name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  # Publish job. Disabled until NPM_TOKEN is set on the repo.
  # To enable: add NPM_TOKEN to repo secrets, then remove the `if: false` line below.
  publish:
    name: Publish to npm
    needs: release-please
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm run verify

      - name: Build core package
        run: pnpm --filter playgenx run build

      - name: Publish playgenx
        run: pnpm publish --filter playgenx --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}