name: Release Please

# Opens (or updates) a release PR with conventional-commit-derived
# version bumps. On merge, release-please tags the release and the
# actual npm publish happens in .github/workflows/publish.yml via
# OpenID Connect (Trusted Publisher). No long-lived NPM_TOKEN needed.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json