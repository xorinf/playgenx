name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint + Build + Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the workspace packages in two phases so core can bundle
      # sibling workspace deps: first build all @playgenx/* sub-packages,
      # then build core (which is named `playgenx` at packages/core).
      # Single-phase recursive builds race and leave core's bundle with
      # unbundled external workspace deps. See PR #15 / v0.2.3 notes.
      - name: Verify (lint + build + test)
        run: pnpm run verify
